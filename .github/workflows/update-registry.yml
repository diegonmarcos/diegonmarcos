name: Update Registry Catalogs

# Regenerates the GHCR (ghrc/) and Releases (releases/) markdown catalogs
# from the live GitHub API, then commits the refreshed dist/ back to the repo.
#
# REQUIRES secret `REGISTRY_PAT`: a classic PAT with scopes `read:packages`
# + `repo`. The default GITHUB_TOKEN is repo-scoped and CANNOT list user-level
# container packages (`user/packages`) nor read other repos — so a PAT is
# mandatory. Add it via:  gh secret set REGISTRY_PAT -R diegonmarcos/diegonmarcos

on:
  schedule:
    - cron: "17 6 * * *" # daily 06:17 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "ghrc/**"
      - "releases/**"
      - ".github/workflows/update-registry.yml"

concurrency:
  group: update-registry
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  catalog:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.REGISTRY_PAT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build GHCR catalog
        working-directory: ghrc
        run: |
          npm ci
          npm run build

      - name: Build Releases catalog
        working-directory: releases
        run: |
          npm ci
          npm run build

      - name: Commit refreshed catalogs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ghrc/dist releases/dist
          if git diff --cached --quiet; then
            echo "No catalog changes."
          else
            git commit -m "chore(registry): refresh GHCR + Releases catalogs [skip ci]"
            git push
          fi
